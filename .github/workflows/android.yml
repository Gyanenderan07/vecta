name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find and Build Android APK
      run: |
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug
        elif [ -f ./app/gradlew ]; then
          cd app
          chmod +x ./gradlew
          ./gradlew assembleDebug
          cd ..
        else
          echo "Gradlew file not found in root or app directory, generating gradle wrapper..."
          gradle wrapper
          chmod +x ./gradlew
          ./gradlew assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-ai-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk